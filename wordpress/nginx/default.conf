upstream php {
    server unix:/tmp/php-cgi.socket;
    server php:9000;
}

server {
    listen 80;
    server_name wp.local;

    root /var/www/html;

    index index.php;

    add_header Cache-Control "no-cache";
    add_header x-cache-enabled "true";

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
      include fastcgi.conf;
      fastcgi_intercept_errors on;
      fastcgi_pass php;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }

    location ~* \.(eot|ttf|woff|woff2|css|js)$ {
        add_header Access-Control-Allow-Origin *;
    }
}

server {
    listen 443 ssl;
    server_name wp.local;

    root /var/www/html;

    index index.php;

    add_header Cache-Control "no-cache";
    add_header x-cache-enabled "true";

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
      include fastcgi.conf;
      fastcgi_intercept_errors on;
      fastcgi_pass php;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }

    location ~* \.(eot|ttf|woff|woff2|css|js)$ {
        add_header Access-Control-Allow-Origin *;
    }

    ssl_certificate /etc/nginx/certs/self-signed/wp.local.pem;
    ssl_certificate_key /etc/nginx/certs/self-signed/wp.local-key.pem;
}
