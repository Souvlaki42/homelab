networks:
  wordpress:
  proxy:
    external: true

services:
  db:
    image: docker.io/mysql:latest
    container_name: wp-mysql
    restart: always
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: wp
      MYSQL_USER: wp
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - proxy
      - wordpress

  php:
    container_name: wp-php
    userns_mode: keep-id
    user: wp
    group_add:
      - wp
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - ./site:/srv/wp
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    networks:
      - proxy
      - wordpress
